<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBook Customizer - Create Your Extension Shelf</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Bespoke Customizer Styles */
        :root {
            --shelf-bar-height: 80px;
        }

        .customizer-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            padding-bottom: calc(var(--shelf-bar-height) + 40px);
        }

        .tab-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            color: var(--color-text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }

        /* Card Selection States */
        .ext-card.selectable {
            cursor: pointer;
            position: relative;
            user-select: none;
        }

        .ext-card.selected {
            border-color: var(--color-accent);
            background: rgba(255, 77, 77, 0.05);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.15);
        }

        .ext-card.selected::after {
            content: '✓';
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            background: var(--color-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Floating Selection Bar */
        .floating-shelf-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: min(600px, calc(100% - 40px));
            height: var(--shelf-bar-height);
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-accent);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .floating-shelf-bar.visible {
            opacity: 1;
            pointer-events: auto;
            bottom: 32px;
        }

        .shelf-count {
            display: flex;
            flex-direction: column;
        }

        .shelf-count-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--color-accent);
        }

        .shelf-count-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-text-tertiary);
        }

        /* Marketplace UI */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .market-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .market-card:hover {
            border-color: var(--color-accent);
            transform: translateY(-4px);
        }

        .market-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--color-text-tertiary);
        }

        .market-use-count {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--color-accent);
            font-weight: 700;
        }

        /* Modal Overrides */
        .save-modal-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--color-text-tertiary);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Chuyển chế độ sáng/tối">
        <span id="theme-icon">☾</span>
    </button>

    <div class="container">
        <header class="header">
            <div style="position: absolute; top: 20px; left: 24px;">
                <a href="../" class="action-btn secondary" style="min-width: unset; padding: 8px 12px; font-size: 11px;">← Trang chủ</a>
            </div>
            <h1 id="customizer-title">VBook Registry</h1>
            <p id="customizer-subtitle">Tùy biến kệ Extension của riêng bạn</p>
            
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('builder')">🔨 Builder</button>
                <button class="tab-btn" onclick="switchTab('market')">🛒 Marketplace</button>
            </div>
        </header>

        <!-- Builder View -->
        <main id="view-builder" class="customizer-layout">
            <div class="filters">
                <div class="filter-group search-group">
                    <input type="text" id="ext-search" class="search-box" placeholder="Tìm kiếm extension...">
                </div>
                <div class="filter-group">
                    <select id="type-filter" class="filter-select">
                        <option value="all">Tất cả thể loại</option>
                        <option value="novel">Truyện chữ</option>
                        <option value="comic">Truyện tranh</option>
                    </select>
                </div>
            </div>

            <div id="builder-grid" class="extensions-grid">
                <!-- Extensions populated by JS -->
                <div class="loading-state" style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <p>Đang tải kho extension...</p>
                </div>
            </div>
        </main>

        <!-- Marketplace View -->
        <main id="view-market" class="customizer-layout" style="display: none;">
            <div id="market-grid" class="market-grid">
                <!-- Top shelves populated by JS -->
            </div>
        </main>
    </div>

    <!-- Floating Action Bar -->
    <div id="shelf-bar" class="floating-shelf-bar">
        <div class="shelf-count">
            <span id="selected-count" class="shelf-count-value">0</span>
            <span class="shelf-count-label">Đã chọn</span>
        </div>
        <div class="shelf-actions">
            <button class="action-btn secondary" onclick="clearSelection()" style="margin-right: 8px;">Xóa hết</button>
            <button class="action-btn" onclick="showSaveModal()">Tiếp theo →</button>
        </div>
    </div>

    <!-- Save Modal -->
    <div id="save-modal" class="filter-modal">
        <div class="filter-modal-backdrop" onclick="hideSaveModal()"></div>
        <div class="filter-modal-panel">
            <h2 class="filter-modal-title">Lưu kệ sách mới</h2>
            <div class="save-modal-content">
                <div class="input-group">
                    <label>Tên kệ sách</label>
                    <input type="text" id="shelf-title" class="search-box" placeholder="Ví dụ: Kệ truyện Novel của Kychi">
                </div>
                <div class="input-group">
                    <label>Tác giả hiển thị</label>
                    <input type="text" id="shelf-author" class="search-box" placeholder="Tên của bạn">
                </div>
                <div class="input-group">
                    <label>Mô tả ngắn</label>
                    <textarea id="shelf-desc" class="search-box" rows="3" placeholder="Giới thiệu về kệ sách này..."></textarea>
                </div>
                <div class="filter-modal-switch-row">
                    <label class="filter-modal-switch-label" style="font-size: 16px;">Hiển thị ở Marketplace</label>
                    <label class="filter-switch">
                        <input type="checkbox" id="shelf-public" checked>
                        <span class="filter-switch-slider"></span>
                    </label>
                </div>

                <div id="save-error" style="color: var(--color-accent); font-size: 13px; font-weight: 600; display: none;"></div>

                <div class="filter-modal-actions">
                    <button class="filter-modal-btn filter-modal-btn-cancel" onclick="hideSaveModal()">Hủy</button>
                    <button id="final-save-btn" class="filter-modal-btn filter-modal-btn-apply" onclick="handleSave()">Lưu & Lấy link</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="filter-modal">
        <div class="filter-modal-backdrop" onclick="hideSuccessModal()"></div>
        <div class="filter-modal-panel">
            <h2 class="filter-modal-title">🎉 Chúc mừng!</h2>
            <p style="text-align: center; margin-bottom: 24px; color: var(--color-text-secondary);">Kệ sách của bạn đã được tạo thành công.</p>
            
            <div class="input-group" style="margin-bottom: 24px;">
                <label>Link cho App VBook (Stable/Beta)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="generated-url" class="search-box" readonly>
                    <button class="action-btn" onclick="copyResultUrl()">Copy</button>
                </div>
                <p style="font-size: 11px; margin-top: 8px; color: var(--color-text-tertiary);">
                    💡 dán link này vào mục "Nguồn" trong app VBook.
                </p>
            </div>

            <div class="filter-modal-actions is-single">
                <button class="filter-modal-btn filter-modal-btn-apply" onclick="location.reload()">Hoàn tất</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="../theme.js"></script>
    <script src="customizer.js"></script>
</body>
</html>
