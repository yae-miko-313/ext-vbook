<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBook Registry - Integrated Platform Beta</title>
    <link rel="stylesheet" href="../style.css?v=20260419_core">
    <style>
        /* Platform Beta UI Overlays - Tab Core Architecture */
        .platform-tabs {
            display: flex; gap: 10px; margin: 20px auto; max-width: var(--container-width);
            padding: 5px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
        }
        .platform-tab {
            flex: 1; padding: 12px; border: none; background: transparent; color: var(--color-text-secondary);
            font-weight: 600; border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;
        }
        .platform-tab.active { background: var(--color-accent); color: white; box-shadow: var(--shadow-md); }
        
        /* Tab View Blocks */
        .tab-view { display: none; width: 100%; transition: opacity 0.3s ease; }
        .tab-view.active { display: block; animation: viewFadeIn 0.4s ease; }
        @keyframes viewFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Nested Extension Grid in Repo Cards */
        .source-ext-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.03);
            border-radius: 0 0 16px 16px;
        }
        [data-theme="dark"] .source-ext-grid { background: rgba(255,255,255,0.03); }
        .source-card.is-expanded { margin-bottom: 25px; border-color: var(--color-accent); overflow: hidden; }
        
        /* Integrated Builder Button */
        .ext-add-btn {
            position: absolute; top: 50px; right: 15px; width: 34px; height: 34px;
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px;
            color: var(--color-accent); font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ext-add-btn:hover { transform: scale(1.1); background: var(--color-accent); color: white; }
        .ext-card.is-selected { border-color: var(--color-accent); box-shadow: 0 0 0 2px var(--color-accent); }
        .ext-card.is-selected .ext-add-btn { background: var(--color-accent); color: white; border-color: transparent; }

        .cart-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: calc(100% - 40px); max-width: 500px; background: var(--color-bg-elevated);
            border: 1px solid var(--color-accent); border-radius: 24px; padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4); z-index: 1100; transition: transform 0.4s ease;
            backdrop-filter: blur(20px);
        }
        .cart-bar.visible { transform: translateX(-50%) translateY(0); }
        
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .market-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; transition: all 0.3s; display: flex; flex-direction: column; gap: 10px; }
        .market-card:hover { border-color: var(--color-accent); transform: translateY(-4px); }

        /* Skeleton Shimmer */
        .skeleton-card { background: var(--glass-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; position: relative; }
        .skeleton-card::after { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; content: ''; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .skeleton-line { height: 10px; background: rgba(0,0,0,0.05); margin-bottom: 10px; border-radius: 4px; }
        [data-theme="dark"] .skeleton-line { background: rgba(255,255,255,0.05); }
        .skeleton-line-sm { width: 40%; }
        .skeleton-line-md { width: 70%; }
        .skeleton-line-lg { width: 100%; }
    </style>
</head>

<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Chuyển chế độ sáng/tối">
        <span id="theme-icon">☾</span>
    </button>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div style="position: absolute; top: 15px; left: 0;">
                <a href="../" class="action-btn secondary" style="min-width: unset; padding: 6px 12px; font-size: 11px;">← Quay lại</a>
            </div>
            <h1>VBook Extensions</h1>
            <p class="subtitle">Platform Beta: Customizer & Registry</p>

            <div class="header-actions">
                <button id="copy-aggregate-btn" class="action-btn header-copy-btn" type="button">Copy Link Tổng</button>
                <button id="open-guide-btn" class="action-btn secondary" type="button">Hướng dẫn sử dụng</button>
            </div>
        </header>

        <!-- Platform Tabs -->
        <nav class="platform-tabs">
            <button class="platform-tab active" data-tab="extensions">🧩 Danh Sách Ext</button>
            <button class="platform-tab" data-tab="sources">📂 Nguồn Repo</button>
            <button class="platform-tab" data-tab="market">🛒 Kệ Sách</button>
        </nav>

        <!-- VIEW 1: EXTENSIONS CORE -->
        <div id="view-extensions" class="tab-view active">
            <section class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-extensions">0</div>
                    <div class="stat-label">Tổng</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="novel-count">0</div>
                    <div class="stat-label">Truyện Chữ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="comic-count">0</div>
                    <div class="stat-label">Truyện Tranh</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="translate-count">0</div>
                    <div class="stat-label">Dịch</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="tts-count">0</div>
                    <div class="stat-label">TTS</div>
                </div>
            </section>

            <section class="filters">
                <div class="filter-group search-group">
                    <input type="text" id="ext-search-input" placeholder="Tìm extension..." class="search-box">
                </div>
                <button id="open-filter-btn" class="action-btn" type="button">Lọc</button>
            </section>

            <section class="extensions">
                <div id="extensions-grid" class="extensions-grid"></div>
            </section>
        </div>

        <!-- VIEW 2: SOURCES CORE -->
        <div id="view-sources" class="tab-view">
            <section class="stats">
                <div class="stat-card" style="flex: 1;">
                    <div class="stat-number" id="total-authors-count">0</div>
                    <div class="stat-label">Tổng Tác Giả</div>
                </div>
                <div class="stat-card" style="flex: 1;">
                    <div class="stat-number" id="total-source-repos">0</div>
                    <div class="stat-label">Tổng Nguồn</div>
                </div>
            </section>

            <section class="filters">
                <div class="filter-group search-group">
                    <input type="text" id="source-search-input" placeholder="Tìm nguồn repo hoặc tác giả..." class="search-box">
                </div>
            </section>

            <section class="extensions">
                <div id="sources-grid" class="extensions-grid"></div>
            </section>
        </div>

        <!-- VIEW 3: MARKETPLACE CORE -->
        <div id="view-marketplace" class="tab-view">
            <h2 class="authors-panel-title">Kệ Sách Cộng Đồng</h2>
            <div id="market-grid" class="market-grid"></div>
        </div>

        <!-- MODALS (Global) -->
        <div id="filter-modal" class="filter-modal" aria-hidden="true">
            <div class="filter-modal-backdrop" data-filter-close="true"></div>
            <section class="filter-modal-panel">
                <h2 class="filter-modal-title">Lọc</h2>
                <div class="filter-modal-drag-handle"></div>
                <div class="filter-modal-group"><div id="filter-types" class="filter-chip-list"></div></div>
                <div class="filter-modal-group"><div id="filter-locales" class="filter-chip-list"></div></div>
                <div class="filter-modal-group"><div id="filter-authors" class="filter-chip-list"></div></div>
                <div class="filter-modal-switch-row">
                    <span class="filter-modal-switch-label">Hiện NSFW</span>
                    <label class="filter-switch"><input id="filter-nsfw-switch" type="checkbox"><span class="filter-switch-slider"></span></label>
                </div>
                <!-- Action Buttons from Stable -->
                <div class="filter-modal-actions">
                    <button id="filter-cancel-btn" class="filter-modal-btn filter-modal-btn-cancel" type="button">Hủy</button>
                    <button id="filter-apply-btn" class="filter-modal-btn filter-modal-btn-apply" type="button">Áp dụng</button>
                </div>
            </section>
        </div>

        <div id="save-modal" class="filter-modal">
            <div class="filter-modal-backdrop" onclick="document.getElementById('save-modal').classList.remove('show')"></div>
            <section class="filter-modal-panel">
                <h2 class="filter-modal-title">Tạo Kệ Sách Cá Nhân</h2>
                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
                    <input type="text" id="shelf-title" placeholder="Tên kệ sách..." class="search-box">
                    <input type="text" id="shelf-author" placeholder="Tác giả..." class="search-box">
                    <button class="action-btn" style="width: 100%;" onclick="handleSaveShelf()">Lưu & Lấy Link</button>
                </div>
            </section>
        </div>

        <div id="success-modal" class="filter-modal">
            <div class="filter-modal-backdrop" onclick="document.getElementById('success-modal').classList.remove('show')"></div>
            <section class="filter-modal-panel" style="text-align: center;">
                <h2 class="filter-modal-title">Xong!</h2>
                <input type="text" id="generated-url" readonly class="search-box" style="text-align: center; margin-bottom: 12px; font-family: monospace;">
                <button class="action-btn" onclick="navigator.clipboard.writeText(document.getElementById('generated-url').value); showToast('Đã copy!')">Copy Link Registry</button>
            </section>
        </div>

        <!-- STABLE: Lower Components -->
        <section class="contribute">
            <h3 class="authors-panel-title">Nguồn Tham Chiếu <span id="contribute-source-count" class="source-count">0</span></h3>
            <div id="repo-list" class="repo-list"></div>
        </section>

        <footer class="footer">
            <div class="footer-content"><p>Extension VBook Platform v4.2.3 Beta | kychi</p></div>
        </footer>
    </div>

    <!-- Floating UI -->
    <div id="cart-bar" class="cart-bar">
        <div style="font-size: 15px;">Đã chọn <span id="cart-count">0</span> extension</div>
        <button class="action-btn" onclick="document.getElementById('save-modal').classList.add('show')">Lưu Kệ</button>
    </div>

    <button id="back-to-top" class="back-to-top">↑</button>
    <div id="toast" class="toast"></div>

    <script src="../theme.js"></script>
    <script src="customizer.js?v=20260419_core"></script>
</body>

</html>
